<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paginação Rosa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff0f6, #ffe4ec);
    }

    .paginacao {
      display: flex;
      border: 1px solid #f7b6c9;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 8px 25px rgba(255, 105, 180, 0.15);
    }

    .paginacao a {
      width: 60px;
      height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #e75480;
      font-size: 20px;
      font-weight: bold;
      border-right: 1px solid #f7c8d8;
      transition: all 0.25s ease;
      background: #fff;
    }

    .paginacao a:last-child {
      border-right: none;
    }

    .paginacao a:hover {
      background: #f8bbd0;
      color: #ffffff;
      transform: scale(1.05);
    }

    .paginacao a.ativo {
      background: #ec729c;
      color: white;
    }
  </style>
</head>
<body>

  <div class="paginacao">
    <a href="#">«</a>
    <a href="#">1</a>
    <a href="#">2</a>
    <a href="#">3</a>
    <a href="#">»</a>
  </div>

</body>
</html>
